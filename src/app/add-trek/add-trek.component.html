<div class="form-page">
    <h1>{{ isEditMode ? 'Edit Trek' : 'Add New Trek' }}</h1>

    <div class="form-box">

        <input [(ngModel)]="trekData.eventName" placeholder="Event Name">
        <textarea [(ngModel)]="trekData.description" placeholder="Description"></textarea>

        <input [(ngModel)]="trekData.eventTag" placeholder="Event Tag">
        <input [(ngModel)]="trekData.eventTagline" placeholder="Event Tagline">

        <input [(ngModel)]="trekData.category" placeholder="Category">
        <input [(ngModel)]="trekData.trekType" placeholder="Trek Type">
        <input [(ngModel)]="trekData.region" placeholder="Region">
        <input [(ngModel)]="trekData.state" placeholder="State">
        <input [(ngModel)]="trekData.district" placeholder="District">

        <input [(ngModel)]="trekData.distance" placeholder="Distance">
        <input [(ngModel)]="trekData.duration" placeholder="Duration">
        <input [(ngModel)]="trekData.altitude" placeholder="Altitude">

        <select [(ngModel)]="trekData.difficulty">
            <option *ngFor="let level of difficultyOptions" [value]="level">
                {{ level }}
            </option>
        </select>

        <input type="number" [(ngModel)]="trekData.fees" placeholder="Fees">

        <input [(ngModel)]="trekData.guide.name" placeholder="Guide Name">
        <input [(ngModel)]="trekData.guide.experience" placeholder="Guide Experience">

        <input [(ngModel)]="trekData.trekBaseVillage" placeholder="Base Village">
        <input [(ngModel)]="trekData.departureFrom" placeholder="Departure From">
        <input [(ngModel)]="trekData.trekFrom" placeholder="Trek From">
        <input [(ngModel)]="trekData.trekRoute" placeholder="Trek Route">

        <input [(ngModel)]="trekData.coverImage" placeholder="Cover Image">
        <input [(ngModel)]="imagesInput" placeholder="Images (comma separated)">

        <input [(ngModel)]="includesInput" placeholder="Includes">
        <input [(ngModel)]="inclusionsInput" placeholder="Inclusions">
        <input [(ngModel)]="exclusionsInput" placeholder="Exclusions">
        <input [(ngModel)]="thingsInput" placeholder="Things To Carry">
        <input [(ngModel)]="pickupInput" placeholder="Pickup Locations">
        <input [(ngModel)]="attractionInput" placeholder="Major Attractions">
        <input [(ngModel)]="seasonInput" placeholder="Seasons">

        <h2>Itinerary</h2>

        <div *ngFor="let item of trekData.itinerary; let i=index" class="batch-box">
            <input type="number" [(ngModel)]="item.day" placeholder="Day">
            <input [(ngModel)]="item.title" placeholder="Title">
            <textarea [(ngModel)]="item.description" placeholder="Description"></textarea>
            <button (click)="removeItinerary(i)">Remove</button>
        </div>

        <button (click)="addItinerary()">Add Itinerary</button>

        <textarea [(ngModel)]="trekData.refundPolicy" placeholder="Refund Policy"></textarea>

        <label><input type="checkbox" [(ngModel)]="trekData.popular"> Popular</label>
        <label><input type="checkbox" [(ngModel)]="trekData.subtitleVisible"> Subtitle Visible</label>
        <label><input type="checkbox" [(ngModel)]="trekData.specialEvent"> Special Event</label>

        <select [(ngModel)]="trekData.status">
            <option *ngFor="let status of trekStatusOptions" [value]="status">
                {{ status }}
            </option>
        </select>

        <h2>Batches</h2>

        <div *ngFor="let batch of trekData.batches; let i=index" class="batch-box">
            <input [value]="batch.batchId" readonly>
            <input type="date" [(ngModel)]="batch.eventDate" (change)="updateBatchId(batch, i)">
            <input type="date" [(ngModel)]="batch.endDate">
            <input [(ngModel)]="batch.reportingTime" placeholder="Reporting Time">
            <input type="number" [(ngModel)]="batch.totalSeats" placeholder="Total Seats">
            <input type="number" [(ngModel)]="batch.availableSeats" placeholder="Available Seats">
            <input type="number" [(ngModel)]="batch.fees" placeholder="Batch Fees">
            <input type="number" [(ngModel)]="batch.discountFee" placeholder="Batch Discount Fee">

            <select [(ngModel)]="batch.status">
                <option *ngFor="let status of batchStatusOptions" [value]="status">
                    {{ status }}
                </option>
            </select>

            <button (click)="removeBatch(i)">Remove</button>
        </div>

        <button (click)="addBatch()">Add Batch</button>

        <button (click)="saveTrek()">
            {{ isEditMode ? 'Update Trek' : 'Save Trek' }}
        </button>

    </div>
</div>
