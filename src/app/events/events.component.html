<!-- UPCOMING EVENTS -->
<div *ngIf="loading">
    Loading...
</div>
<div *ngIf="!loading">
    <section class="trek-section">
        <div class="container-fluid px-5 ">
            <div class="row">
                <div class="col-xl-3 col-lg-3 col-md-6 mb-4" *ngFor="let event of allevents">
                    <div class="trek-card">
                        <div class="trek-image">
                            <img [src]="event.coverImage || '/assets/images/default-trek.jpg'" alt="">
                            <div class="difficulty-badge">
                                {{event.difficulty}}
                            </div>
                        </div>
                        <div class="trek-body">
                            <h4>
                                {{event.eventname}}
                            </h4>
                            <div class="trek-info">
                                <span>
                                    📅
                                    {{event.batches[0].eventDate | date:'dd MMM yyyy'}}
                                </span>
                                <span>
                                    ⏱️
                                    {{event.duration}}
                                </span>
                            </div>
                            <div class="trek-info">
                                <span>
                                    📍
                                    {{event.trekFrom}}
                                </span>
                            </div>
                            <div class="trek-footer">
                                <div class="price">
                                    ₹ {{event.batches[0].fees}}
                                </div>
                                <div *ngIf="event.batches[0].availableSeats > 10" class="seats">
                                    {{event.batches[0].availableSeats}} Seats Left
                                </div>
                                <span *ngIf="event.batches[0].availableSeats <= 10" class="text-danger fw-bold">
                                    Only Few Seats Left
                                </span>
                            </div>
                            <button class="btn book-btn" [routerLink]="['/trek-details', event._id]">
                                Book Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
