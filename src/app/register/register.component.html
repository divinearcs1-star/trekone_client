<div class="register-page">
    <div class="register-card">
        <div class="form-header">
            <div class="logo-circle">
                🏔️
            </div>
            <h1>Create Account</h1>
            <p>
                Join TrekOne and start exploring unforgettable adventures.
            </p>
        </div>
        <form [formGroup]="MForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label appAstrict>Email Address</label>
                <input type="text" class="form-control" placeholder="Enter Email" formControlName="email"
                    [class.is-invalid]="MForm.get('email')?.invalid && MForm.get('email')?.touched">
            </div>
            <div class="form-group">
                <label appAstrict>Password</label>
                <input type="password" class="form-control" placeholder="Create Password" formControlName="password"
                    [(ngModel)]="password" (input)="checkPasswordStrength()"
                    [class.is-invalid]="MForm.get('password')?.invalid && MForm.get('password')?.touched">
            </div>
            <div class="strength-card">
                <div class="strength-title">
                    Password Strength:
                    <span [ngClass]="strengthClass">
                        {{strength}}
                    </span>
                </div>
                <small>
                    Password must contain:
                    8+ characters, uppercase, lowercase,
                    number and special character.
                </small>
            </div>
            <div class="form-group">
                <label appAstrict>Phone Number</label>
                <input type="text" class="form-control" placeholder="Enter Phone" formControlName="phone"
                    [class.is-invalid]="MForm.get('phone')?.invalid && MForm.get('phone')?.touched">
            </div>
            <div class="form-group">
                <label appAstrict>City</label>
                <input type="text" class="form-control" placeholder="Enter City" formControlName="city"
                    [class.is-invalid]="MForm.get('city')?.invalid && MForm.get('city')?.touched">
            </div>
            <button type="submit" class="submit-btn" [disabled]="!MForm.valid" (click)="submitdata()">
                Create Account
            </button>
        </form>
    </div>
</div>
