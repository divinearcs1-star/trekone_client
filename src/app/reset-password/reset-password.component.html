<div class="reset-container">
   <div class="overlay"></div>
   <div class="reset-card">
      <div class="logo-section">
         <h1>TrekOne</h1>
         <p>Reset your password</p>
         <span>
            Create a new secure password for your account and continue your journey.
         </span>
      </div>
      <form [formGroup]="MForm" (ngSubmit)="resetPassword()">
         <div class="input-group form-group password-wrapper">
            <label>New Password</label>
            <input [type]="showPassword ? 'text' : 'password'" class="form-control password-input"
               placeholder="Enter your new password" formControlName="password" (input)="checkPasswordStrength()" />
            <span class="toggle-icon" (click)="togglePassword()">
               <img [src]="showPassword ? 'assets/icons/eye.svg' : 'assets/icons/eye.svg'" alt="toggle password"
                  width="20" height="20" />
            </span>
         </div>
         <div *ngIf="MForm.get('password')?.invalid && MForm.get('password')?.touched" style="color: red" class="error-text">
            Password must be at least 8 characters.
         </div>
         <div class="strength-card">
            <div class="strength-title">
               Password Strength:
               <span [ngClass]="strengthClass">
                  {{ strength }}
               </span>
            </div>
            <small>
               Password must contain:
               8+ characters, uppercase, lowercase,
               number and special character.
            </small>
         </div>
         <button type="submit" [disabled]="MForm.invalid">
            Reset Password
         </button>
      </form>
      <div class="footer-text">
         <a routerLink="/login">Back to Login</a>
      </div>
   </div>
</div>
